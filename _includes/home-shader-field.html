<link rel="stylesheet" href="{{ '/assets/css/home-showcase.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/card-holo.css' | relative_url }}">

<section class="home-field" data-home-showcase>
  <canvas class="home-field__canvas" aria-label="Realtime shader artwork"></canvas>

  <div class="home-field__cards" aria-label="Portfolio showcase">
    <div class="card-slot">
      <a
        class="card interactive water"
        href="{{ '/about/' | relative_url }}"
        aria-label="about"
        data-card
        data-image="{{ '/assets/img/card-render.svg' | relative_url }}"
        data-title="about"
        data-subtitle="haelime / graphics dev"
        style="--card-image: url('{{ '/assets/img/card-render.svg' | relative_url }}');"
      >
        <span class="card__shine"></span>
        <span class="card__glare"></span>
      </a>
      <div class="card-caption" aria-hidden="true">
        <span class="card__label-title">about</span>
        <span class="card__label-subtitle">haelime / graphics dev</span>
      </div>
    </div>

    <div class="card-slot">
      <a
        class="card interactive fire"
        href="https://github.com/haelime"
        target="_blank"
        rel="noopener"
        aria-label="projects"
        data-card
        data-image="{{ '/assets/img/card-shader.svg' | relative_url }}"
        data-title="projects"
        data-subtitle="renderers / shaders / games"
        style="--card-image: url('{{ '/assets/img/card-shader.svg' | relative_url }}');"
      >
        <span class="card__shine"></span>
        <span class="card__glare"></span>
      </a>
      <div class="card-caption" aria-hidden="true">
        <span class="card__label-title">projects</span>
        <span class="card__label-subtitle">renderers / shaders / games</span>
      </div>
    </div>

    <div class="card-slot">
      <a
        class="card interactive grass"
        href="{{ '/about/#stack' | relative_url }}"
        aria-label="resume"
        data-card
        data-image="{{ '/assets/img/card-engine.svg' | relative_url }}"
        data-title="resume"
        data-subtitle="C++ / Vulkan / engine"
        style="--card-image: url('{{ '/assets/img/card-engine.svg' | relative_url }}');"
      >
        <span class="card__shine"></span>
        <span class="card__glare"></span>
      </a>
      <div class="card-caption" aria-hidden="true">
        <span class="card__label-title">resume</span>
        <span class="card__label-subtitle">C++ / Vulkan / engine</span>
      </div>
    </div>

    <div class="card-slot">
      <a
        class="card interactive psychic"
        href="{{ '/archives/' | relative_url }}"
        aria-label="more+"
        data-card
        data-image="{{ '/assets/img/card-code.svg' | relative_url }}"
        data-title="more+"
        data-subtitle="posts / notes / links"
        style="--card-image: url('{{ '/assets/img/card-code.svg' | relative_url }}');"
      >
        <span class="card__shine"></span>
        <span class="card__glare"></span>
      </a>
      <div class="card-caption" aria-hidden="true">
        <span class="card__label-title">more+</span>
        <span class="card__label-subtitle">posts / notes / links</span>
      </div>
    </div>
  </div>

  <nav class="home-field__links" aria-label="Portfolio links">
    <a href="{{ '/about/' | relative_url }}">about</a>
    <a href="https://github.com/haelime" target="_blank" rel="noopener">projects</a>
    <a href="{{ '/about/#stack' | relative_url }}">resume</a>
    <a href="{{ '/archives/' | relative_url }}">more+</a>
  </nav>
</section>

<script type="module" src="{{ '/assets/js/home-showcase.js' | relative_url }}"></script>
