<link rel="stylesheet" href="{{ '/assets/css/home-showcase.css' | relative_url }}">

<section class="home-field" data-home-showcase>
  <canvas class="home-field__canvas" aria-label="Realtime shader artwork"></canvas>

  <div class="home-field__cards" aria-label="Portfolio showcase">
    <div class="card-slot">
      <a
        class="card interactive water"
        href="{{ '/archives/' | relative_url }}"
        aria-label="Vulkan Renderer"
        data-card
        data-image="{{ '/assets/img/card-render.svg' | relative_url }}"
        data-title="Vulkan Renderer"
        data-subtitle="Render Graph / GPU Sync"
        style="--card-image: url('{{ '/assets/img/card-render.svg' | relative_url }}');"
      >
        <span class="card__front">
          <img src="{{ '/assets/img/card-render.svg' | relative_url }}" alt="" width="660" height="921" loading="lazy">
          <span class="card__shine"></span>
          <span class="card__glare"></span>
        </span>
      </a>
      <div class="card-caption" aria-hidden="true">
        <span class="card__label-title">Vulkan Renderer</span>
        <span class="card__label-subtitle">Render Graph / GPU Sync</span>
      </div>
    </div>

    <div class="card-slot">
      <a
        class="card interactive fire"
        href="https://www.shadertoy.com/view/lffGRj"
        target="_blank"
        rel="noopener"
        aria-label="Shader Lab"
        data-card
        data-image="{{ '/assets/img/card-shader.svg' | relative_url }}"
        data-title="Shader Lab"
        data-subtitle="GLSL / WebGL / Effects"
        style="--card-image: url('{{ '/assets/img/card-shader.svg' | relative_url }}');"
      >
        <span class="card__front">
          <img src="{{ '/assets/img/card-shader.svg' | relative_url }}" alt="" width="660" height="921" loading="lazy">
          <span class="card__shine"></span>
          <span class="card__glare"></span>
        </span>
      </a>
      <div class="card-caption" aria-hidden="true">
        <span class="card__label-title">Shader Lab</span>
        <span class="card__label-subtitle">GLSL / WebGL / Effects</span>
      </div>
    </div>

    <div class="card-slot">
      <a
        class="card interactive grass"
        href="{{ '/archives/' | relative_url }}"
        aria-label="Engine Notes"
        data-card
        data-image="{{ '/assets/img/card-engine.svg' | relative_url }}"
        data-title="Engine Notes"
        data-subtitle="C++ / SDL / Architecture"
        style="--card-image: url('{{ '/assets/img/card-engine.svg' | relative_url }}');"
      >
        <span class="card__front">
          <img src="{{ '/assets/img/card-engine.svg' | relative_url }}" alt="" width="660" height="921" loading="lazy">
          <span class="card__shine"></span>
          <span class="card__glare"></span>
        </span>
      </a>
      <div class="card-caption" aria-hidden="true">
        <span class="card__label-title">Engine Notes</span>
        <span class="card__label-subtitle">C++ / SDL / Architecture</span>
      </div>
    </div>

    <div class="card-slot">
      <a
        class="card interactive psychic"
        href="https://github.com/haelime"
        target="_blank"
        rel="noopener"
        aria-label="GitHub"
        data-card
        data-image="{{ '/assets/img/card-code.svg' | relative_url }}"
        data-title="GitHub"
        data-subtitle="Code / Projects / Logs"
        style="--card-image: url('{{ '/assets/img/card-code.svg' | relative_url }}');"
      >
        <span class="card__front">
          <img src="{{ '/assets/img/card-code.svg' | relative_url }}" alt="" width="660" height="921" loading="lazy">
          <span class="card__shine"></span>
          <span class="card__glare"></span>
        </span>
      </a>
      <div class="card-caption" aria-hidden="true">
        <span class="card__label-title">GitHub</span>
        <span class="card__label-subtitle">Code / Projects / Logs</span>
      </div>
    </div>
  </div>

  <nav class="home-field__links" aria-label="Portfolio links">
    <a href="https://github.com/haelime" target="_blank" rel="noopener">GitHub</a>
    <a href="https://www.shadertoy.com/view/lffGRj" target="_blank" rel="noopener">Shadertoy</a>
    <a href="{{ '/archives/' | relative_url }}">Posts</a>
  </nav>
</section>

<script type="module" src="{{ '/assets/js/home-showcase.js' | relative_url }}"></script>
